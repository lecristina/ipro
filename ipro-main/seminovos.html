<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="iPro – Seminovos Apple com 1 ano de garantia. iPhone, MacBook, iPad, Apple Watch e iMac em Campinas. Parcelamos em até 18x sem juros." />
  <title>Seminovos Apple — iPro Campinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            apple: { black: '#1d1d1f', gray: '#f5f5f7', darkgray: '#86868b', blue: '#0066cc', border: '#d2d2d7' }
          }
        }
      }
    }
  </script>
  <style>
    [data-aos] { opacity: 0; transform: translateY(24px); transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1); }
    [data-aos].is-visible { opacity: 1; transform: translateY(0); }
    .thumb-active { ring: 2px solid #1a6cff; }
  </style>
</head>
<body class="bg-white text-apple-black font-sans antialiased selection:bg-apple-black selection:text-white overflow-x-hidden">

  <div id="site-header"></div>
  <script src="js/header.js?v=2"></script>
  <script defer src="js/agendamento.js?v=7"></script>

  <main>
    <!-- HERO -->
    <section class="pt-28 pb-14 bg-[#f0eeeb]">
      <div class="max-w-4xl mx-auto px-6 text-center" data-aos>
        <span class="inline-block text-xs font-mono tracking-[0.2em] uppercase text-[#999] mb-5">Apple Seminovos</span>
        <h1 class="text-[42px] sm:text-[56px] md:text-[68px] leading-[1.05] font-semibold tracking-tighter text-[#1a1a1a] mb-4">
          Seminovos com<br><span class="text-[#1a6cff]">garantia de 1 ano.</span>
        </h1>
        <p class="text-lg text-[#777] max-w-xl mx-auto">Dispositivos Apple verificados, testados e com garantia. Parcelamos em até 18x sem juros no cartão.</p>
      </div>
    </section>

    <hr class="border-t border-[#d2d2d7]/60 mx-4">

    <!-- PRODUCTS GRID -->
    <section class="py-14 bg-[#f0eeeb]">
      <div class="max-w-7xl mx-auto px-6">
        <div class="mb-14" data-aos>
          <span class="inline-block text-xs font-mono tracking-[0.2em] uppercase text-[#999] mb-5">Produtos disponíveis</span>
          <h2 class="text-4xl md:text-[56px] font-semibold tracking-tighter leading-tight text-[#1a1a1a]">Escolha o seu.</h2>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-5" id="products-grid">
          <!-- Products will be injected here by JS -->
        </div>

        <div id="no-products" class="hidden text-center py-20">
          <p class="text-lg text-[#999]">Nenhum produto disponível no momento.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/footer.js"></script>

  <!-- PRODUCT DETAIL POPUP -->
  <div id="product-popup" class="fixed inset-0 z-[9999] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300" style="background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[92vh] flex flex-col relative transform scale-95 transition-transform duration-300" id="product-popup-inner">
      <button onclick="closeProductPopup()" class="absolute top-4 right-4 w-10 h-10 bg-[#f5f5f7] hover:bg-[#e0e0e0] rounded-full flex items-center justify-center transition-colors z-10">
        <svg class="w-5 h-5 text-[#1a1a1a]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div class="overflow-y-auto flex-1 p-6 sm:p-8">
        <!-- Title at the top, centered, full-width -->
        <h2 id="popup-title" class="text-2xl sm:text-4xl font-bold text-[#1a1a1a] tracking-tight mb-4 text-center leading-tight"></h2>
        <!-- Bigger badges below title -->
        <div class="flex flex-wrap items-center justify-center gap-3 mb-7">
          <span class="inline-flex items-center gap-1.5 bg-[#e8f5e9] text-[#2e7d32] text-sm font-bold px-5 py-2.5 rounded-full">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            1 ano de garantia
          </span>
          <span class="inline-flex items-center gap-1.5 bg-[#e3f2fd] text-[#1565c0] text-sm font-bold px-5 py-2.5 rounded-full">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            18x sem juros
          </span>
        </div>
        <!-- Photo + Info columns -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- LEFT: Gallery -->
          <div>
            <div class="relative rounded-2xl overflow-hidden bg-[#f5f5f7] mb-4 flex items-center justify-center" style="min-height:300px;">
              <img loading="lazy" id="popup-main-img" src="" alt="" class="w-full object-contain" style="max-height:400px;">
              <img loading="lazy" src="images/verificado.png" alt="Verificado" class="absolute bottom-3 right-3 w-8 h-8">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2" id="popup-thumbs"></div>
          </div>
          <!-- RIGHT: Info (title moved to top) -->
          <div class="flex flex-col">
            <p id="popup-desc" class="text-sm text-[#777] mb-6 leading-relaxed"></p>
            <div class="space-y-3 mb-6" id="popup-specs"></div>
            <div class="mt-auto border-t border-[#eee] pt-5">
              <div id="popup-old-price" class="text-sm text-[#aaa] line-through"></div>
              <div id="popup-price" class="text-3xl font-bold text-[#1a1a1a] mb-1"></div>
              <div id="popup-installments" class="text-sm text-[#888] mb-5"></div>
              <a id="popup-whatsapp" href="#" target="_blank" rel="noopener"
                 class="flex items-center justify-center gap-2 bg-[#1a1a1a] hover:bg-[#1a6cff] text-white font-semibold py-4 rounded-xl transition-colors text-sm w-full">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Comprar via WhatsApp
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // AOS observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('is-visible'); observer.unobserve(entry.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-aos]').forEach(el => observer.observe(el));

    // ------------------------------------------------------------
    // PRODUTOS SEMINOVOS — carregados via API (admin panel)
    // ------------------------------------------------------------
    let seminovosData = [];

    async function loadSeminovosData() {
      try {
        const res = await fetch('/api/seminovos');
        const data = await res.json();
        seminovosData = data.map(item => ({
          titulo: item.titulo,
          categoria: item.categoria,
          descricao: item.descricao,
          preco: parseFloat(item.preco) || 0,
          precoOriginal: parseFloat(item.preco_original) || 0,
          imagens: item.imagens || [],
          específicacoes: item.específicacoes || []
        }));
      } catch {
        seminovosData = [];
      }
      renderProducts();
    }
    loadSeminovosData();
    // ------------------------------------------------------------

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      const noProducts = document.getElementById('no-products');
      grid.innerHTML = '';

      if (!seminovosData.length) {
        noProducts.classList.remove('hidden');
        return;
      }
      noProducts.classList.add('hidden');

      seminovosData.forEach((prod, idx) => {
        const mainImg = prod.imagens && prod.imagens.length ? prod.imagens[0] : 'images-seminovos/iphone-14-pro-seminovo.jpg';
        const discount = prod.precoOriginal && prod.preco ? Math.round((1 - prod.preco / prod.precoOriginal) * 100) : 0;
        const installment = prod.preco ? (prod.preco / 18).toFixed(2).replace('.', ',') : '0,00';
        const priceFormatted = prod.preco ? prod.preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
        const oldPriceFormatted = prod.precoOriginal ? prod.precoOriginal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';

        const card = document.createElement('div');
        card.className = 'group bg-[#f9f9f9] rounded-3xl overflow-hidden flex flex-col hover:shadow-2xl hover:shadow-black/10 hover:-translate-y-1 transition-all duration-300 cursor-pointer';
        card.setAttribute('data-aos', '');
        card.onclick = () => openProductPopup(idx);
        card.innerHTML = `
          <div class="relative overflow-hidden">
            <img loading="lazy" src="${mainImg}" alt="${prod.titulo || ''}" class="w-full h-32 sm:h-52 object-cover group-hover:scale-105 transition-transform duration-500">
            ${discount > 0 ? `<span class="absolute top-2 left-2 sm:top-3 sm:left-3 bg-[#1a6cff] text-white text-[10px] sm:text-xs font-bold px-2 sm:px-2.5 py-0.5 sm:py-1 rounded-full">${discount}% OFF</span>` : ''}
            <img loading="lazy" src="images/verificado.png" alt="Verificado" class="absolute bottom-2 right-2 w-6 h-6 sm:w-7 sm:h-7">
          </div>
          <div class="p-3 sm:p-6 flex flex-col flex-1">
            <h3 class="text-xs sm:text-sm font-semibold tracking-tight text-[#1a1a1a] mb-2 sm:mb-3 leading-snug">${prod.titulo || 'Produto'}</h3>
            <div class="flex items-center gap-1.5 mb-3">
              <span class="bg-[#e8f5e9] text-[#2e7d32] text-[9px] sm:text-[10px] font-bold px-2 py-0.5 rounded-full">1 ano garantia</span>
            </div>
            <div class="mt-auto">
              ${prod.precoOriginal ? `<div class="text-xs text-[#aaa] line-through mb-0.5">${oldPriceFormatted}</div>` : ''}
              <div class="text-xl font-bold text-[#1a1a1a] mb-0.5">${priceFormatted}</div>
              <div class="text-xs text-[#888] mb-4">18x ${installment} sem juros</div>
              <span class="block text-center bg-[#1a1a1a] hover:bg-[#1a6cff] text-white text-sm font-semibold rounded-xl py-2.5 transition-colors duration-200">Ver detalhes</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      // re-observe AOS
      document.querySelectorAll('[data-aos]:not(.is-visible)').forEach(el => observer.observe(el));
    }

    function openProductPopup(idx) {
      const prod = seminovosData[idx];
      if (!prod) return;

      document.getElementById('popup-title').textContent = prod.titulo || '';
      document.getElementById('popup-desc').textContent = prod.descricao || '';

      const mainImg = document.getElementById('popup-main-img');
      const imgs = prod.imagens && prod.imagens.length ? prod.imagens : ['images-seminovos/iphone-14-pro-seminovo.jpg'];
      mainImg.src = imgs[0];
      mainImg.alt = prod.titulo || '';

      // Thumbnails
      const thumbsContainer = document.getElementById('popup-thumbs');
      thumbsContainer.innerHTML = '';
      imgs.forEach((img, i) => {
        const isVideo = /\.(mp4|webm|mov)$/i.test(img);
        const thumb = document.createElement('button');
        thumb.className = `w-16 h-16 rounded-xl overflow-hidden border-2 shrink-0 transition-all ${i === 0 ? 'border-[#1a6cff]' : 'border-transparent hover:border-[#ccc]'}`;
        if (isVideo) {
          thumb.innerHTML = `<div class="w-full h-full bg-[#1a1a1a] flex items-center justify-center"><svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`;
        } else {
          thumb.innerHTML = `<img loading="lazy" src="${img}" alt="" class="w-full h-full object-cover">`;
        }
        thumb.onclick = () => {
          if (isVideo) {
            mainImg.parentElement.innerHTML = `<video src="${img}" controls autoplay class="w-full h-full object-contain"></video><img loading="lazy" src="images/verificado.png" alt="Verificado" class="absolute bottom-3 right-3 w-8 h-8">`;
          } else {
            const videoEl = mainImg.parentElement.querySelector('video');
            if (videoEl) {
              mainImg.parentElement.innerHTML = `<img loading="lazy" id="popup-main-img" src="${img}" alt="${prod.titulo || ''}" class="w-full h-full object-contain"><img loading="lazy" src="images/verificado.png" alt="Verificado" class="absolute bottom-3 right-3 w-8 h-8">`;
            } else {
              mainImg.src = img;
            }
          }
          thumbsContainer.querySelectorAll('button').forEach(b => b.className = b.className.replace('border-[#1a6cff]', 'border-transparent'));
          thumb.className = thumb.className.replace('border-transparent', 'border-[#1a6cff]');
        };
        thumbsContainer.appendChild(thumb);
      });

      // Specs
      const specsDiv = document.getElementById('popup-specs');
      specsDiv.innerHTML = '';
      if (prod.específicacoes && prod.específicacoes.length) {
        prod.específicacoes.forEach(spec => {
          specsDiv.innerHTML += `<div class="flex items-center justify-between py-2.5 px-4 bg-[#f5f5f7] rounded-xl text-sm"><span class="text-[#777]">${spec.label}</span><span class="font-semibold text-[#1a1a1a]">${spec.valor}</span></div>`;
        });
      }

      // Price
      const priceFormatted = prod.preco ? prod.preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
      const oldPriceFormatted = prod.precoOriginal ? prod.precoOriginal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
      const installment = prod.preco ? 'R$ ' + (prod.preco / 18).toFixed(2).replace('.', ',') : '';

      document.getElementById('popup-price').textContent = priceFormatted;
      document.getElementById('popup-old-price').textContent = oldPriceFormatted;
      document.getElementById('popup-installments').textContent = installment ? `ou 18x de ${installment} sem juros` : '';

      const encodedTitle = encodeURIComponent(prod.titulo || 'Produto');
      document.getElementById('popup-whatsapp').href = `https://api.whatsapp.com/send?phone=5519994063782&text=Ol%C3%A1!%20Tenho%20interesse%20no%20seminovo:%20${encodedTitle}`;

      // Show popup
      const popup = document.getElementById('product-popup');
      const inner = document.getElementById('product-popup-inner');
      popup.style.opacity = '1';
      popup.style.pointerEvents = 'auto';
      inner.style.transform = 'scale(1)';
      document.body.style.overflow = 'hidden';
    }

    function closeProductPopup() {
      const popup = document.getElementById('product-popup');
      const inner = document.getElementById('product-popup-inner');
      popup.style.opacity = '0';
      popup.style.pointerEvents = 'none';
      inner.style.transform = 'scale(0.95)';
      document.body.style.overflow = '';
    }

    document.getElementById('product-popup').addEventListener('click', function(e) {
      if (e.target === this) closeProductPopup();
    });
  </script>

</body>
</html>
